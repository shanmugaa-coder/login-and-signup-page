<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="style.css/stylesheet2.css">
</head>
<body>
    <h1>WELCOME!</h1>
    <center><div class="Signup_box">
        <h1>SIGN UP</h1>
        <form>
            <table>
                <tr>
                    <td><label>NAME:</label></td>
                     <td>
                        <input type="text" placeholder="ENTER YOUR NAME" >
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>AGE:</label>
                    </td>
                    <td>
                        <input type="number" placeholder="ENTER YOUR AGE">
                    </td>
                   
                </tr>
                 <tr>
                    <td><label>Gender:</label></td>
                    
                
                
                    <td><input type="radio" name="gender">MALE 
                        <input type="radio" name="gender">FEMALE</td>
                </tr>
                <tr>
                    <td><label>DOB:</label></td>
                     <td><input type="date"></td>

                </tr>
                <tr>
                    <td><label>EMAIL:</label></td>
                      <td>
                        <input type="email" placeholder="ENTER YOUR E-MAIL">
                    </td>
                </tr>
                
                  
                
                <tr>
                    <td><label>CREATE PASSWORD:</label></td>
                    <td><input type="password" placeholder="ENTER YOUR PASSWORD"></td>
                </tr>
            
               
                <td>
                    <td><input type="submit" value="register"></td>
                </td>
            </table>
        </form>
        <h2>Already a member?<a href="home.html">log in</a></h2>
    </div></center>
</body>
</html>
